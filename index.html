<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>dori</title>

  <!-- ===== 광고 연결 준비: Google H5 Games Ads (전면·보상형) =====
       승인·동의(CMP)·커스텀 도메인 준비 후 아래 주석을 해제하고 ca-pub-XXXX를 실제 ID로 교체.
       그리고 src/ads.js의 AdConfig.enabled=true, provider='google-h5'로 전환. (docs/commercial.md)
  <script async data-ad-frequency-hint="30s"
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX"
    crossorigin="anonymous"></script>
  <script>
    window.adsbygoogle = window.adsbygoogle || [];
    window.adBreak = window.adConfig = function (o) { adsbygoogle.push(o); };
  </script>
  ============================================================= -->

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #12131c;
      overflow: hidden;
    }
    #game { width: 100vw; height: 100vh; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="game"></div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
